<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureTech Chile | Seguridad & Electricidad Avanzada</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #00ff88;
  --primary-dim: rgba(0,255,136,0.15);
  --accent: #0ea5e9;
  --bg: #050a0e;
  --bg2: #0a1520;
  --card: rgba(15, 30, 45, 0.85);
  --border: rgba(0,255,136,0.15);
  --text: #e2eaf0;
  --muted: #7a9ab0;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* ─── NOISE OVERLAY ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--primary); border-radius:4px; }

/* ══════════════════════════════
HEADER / NAV
══════════════════════════════ */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1001;
  background: rgba(5,10,14,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

nav {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  height: 70px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.3rem;
  color: var(--primary);
  letter-spacing: 2px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo span { color: white; }
.logo-dot {
  width: 8px; height: 8px;
  background: var(--primary);
  border-radius: 50%;
  animation: blink 1.5s infinite;
}
@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0.2; }
}

.nav-links {
  display: flex;
  list-style: none;
  align-items: center;
  gap: 5px;
}

.nav-links > li {
  position: relative;
}

.nav-links > li > a {
  color: var(--text);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

.nav-links > li > a:hover,
.nav-links > li > a.active {
  color: var(--primary);
  background: var(--primary-dim);
}

.nav-links > li > a svg {
  transition: transform 0.2s;
}
.nav-links > li:hover > a svg {
  transform: rotate(180deg);
}

/* DROPDOWN */
.dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 10px);
  left: 0;
  background: #0d1f2d;
  border: 1px solid var(--border);
  border-radius: 12px;
  min-width: 260px;
  overflow: hidden;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  animation: dropIn 0.2s ease;
}
@keyframes dropIn {
  from { opacity:0; transform:translateY(-8px); }
  to   { opacity:1; transform:translateY(0); }
}

.nav-links > li:hover .dropdown { display: block; }

.dropdown a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 18px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 400;
  transition: all 0.2s;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.dropdown a:last-child { border-bottom: none; }
.dropdown a:hover { background: var(--primary-dim); color: var(--primary); padding-left: 24px; }
.dropdown a .icon { font-size: 1.1rem; width: 24px; text-align: center; }

.nav-cta {
  background: var(--primary);
  color: #000 !important;
  padding: 10px 22px !important;
  border-radius: 50px !important;
  font-weight: 700 !important;
  font-size: 0.85rem !important;
  transition: all 0.3s !important;
  text-decoration: none;
}
.nav-cta:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 0 25px rgba(0,255,136,0.4) !important;
  background: #00e87a !important;
  color: #000 !important;
}

/* HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 5px;
  background: none;
  border: none;
  z-index: 1002;
}
.hamburger span {
  display: block;
  width: 25px;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all 0.3s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

/* MOBILE MENU */
.mobile-menu {
  display: none;
  position: fixed;
  top: 70px; left: 0; right: 0; bottom: 0;
  background: rgba(5,10,14,0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  padding: 30px;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
}
.mobile-menu.open { display: flex; }

.mobile-menu a {
  color: var(--text);
  text-decoration: none;
  font-size: 1.1rem;
  padding: 18px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-weight: 500;
  transition: color 0.2s;
}
.mobile-menu a:hover { color: var(--primary); }
.mobile-menu .mobile-cta {
  margin-top: 25px;
  background: var(--primary);
  color: #000;
  font-weight: 700;
  border-radius: 50px;
  text-align: center;
  padding: 16px;
  font-size: 1rem;
  border-bottom: none;
}

/* ══════════════════════════════
HERO
══════════════════════════════ */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;

  padding: 120px 20px 80px;
