<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronVolt | Ingeniería Eléctrica y Seguridad Avanzada</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Paleta Azul / Celeste Tecnológico IronVolt */
  --primary: #0ea5e9; 
  --primary-dim: rgba(14, 165, 233, 0.15);
  --accent: #38bdf8; 
  --bg: #050a0e;
  --bg2: #0a1520;
  --card: rgba(15, 30, 45, 0.85);
  --border: rgba(14, 165, 233, 0.2);
  --text: #e2eaf0;
  --muted: #8ba5b8;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  font-weight: 400;
  line-height: 1.6;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--primary); border-radius:4px; }

/* ══════════════════════════════
HEADER / NAV
══════════════════════════════ */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1001;
  background: rgba(5,10,14,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

nav {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  height: 75px;
}

.logo {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 1.5rem;
  color: var(--primary);
  letter-spacing: -0.5px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo span { color: white; }
.logo-dot {
  width: 8px; height: 8px;
  background: var(--primary);
  border-radius: 50%;
  animation: blink 2s infinite;
}
@keyframes blink {
  0%,100% { opacity:1; box-shadow: 0 0 10px var(--primary); }
  50% { opacity:0.4; box-shadow: none; }
}

.nav-links {
  display: flex;
  list-style: none;
  align-items: center;
  gap: 15px;
}

.nav-links > li {
  position: relative;
  padding: 20px 0;
}

.nav-links > li > a {
  color: var(--text);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.nav-links > li > a:hover,
.nav-links > li > a.active {
  color: var(--primary);
  background: var(--primary-dim);
}

.nav-links > li > a svg {
  transition: transform 0.2s;
}
.nav-links > li:hover > a svg {
  transform: rotate(180deg);
}

/* DROPDOWN */
.dropdown {
  visibility: hidden;
  opacity: 0;
  position: absolute;
  top: 100%;
  left: 0;
  background: #0a1824;
  border: 1px solid var(--border);
  border-radius: 12px;
  min-width: 280px;
  overflow: hidden;
  box-shadow: 0 25px 50px rgba(0,0,0,0.6);
  transform: translateY(10px);
  transition: all 0.3s ease;
}
.nav-links > li:hover .dropdown { 
  visibility: visible; 
  opacity: 1; 
  transform: translateY(0); 
}

.dropdown a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 400;
  transition: all 0.2s;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.dropdown a:last-child { border-bottom: none; }
.dropdown a:hover { background: var(--primary-dim); color: var(--primary); padding-left: 26px; }
.dropdown a .icon { font-size: 1.2rem; width: 26px; text-align: center; }

.nav-cta {
  background: var(--primary);
  color: #fff !important;
  padding: 10px 24px !important;
  border-radius: 50px !important;
  font-weight: 600 !important;
  font-size: 0.9rem !important;
  transition: all 0.3s !important;
  text-decoration: none;
  font-family: 'Montserrat', sans-serif;
  box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
}
.nav-cta:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5) !important;
  background: var(--accent) !important;
}

/* HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 5px;
  background: none;
  border: none;
  z-index: 1002;
}
.hamburger span {
  display: block;
  width: 25px;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all 0.3s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

  background: rgba(
