<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureTech Chile | Seguridad, Automatización & Electricidad</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* Nueva paleta Azul/Celeste Tecnológico */
  --primary: #0ea5e9; 
  --primary-dim: rgba(14, 165, 233, 0.15);
  --accent: #38bdf8;
  --bg: #050a0e;
  --bg2: #0a1520;
  --card: rgba(15, 30, 45, 0.85);
  --border: rgba(14, 165, 233, 0.2);
  --text: #e2eaf0;
  --muted: #8ba5b8;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--primary); border-radius:4px; }

/* ══════════════════════════════
HEADER / NAV
══════════════════════════════ */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1001;
  background: rgba(5,10,14,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

nav {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  height: 75px;
}

.logo {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 1.4rem;
  color: var(--primary);
  letter-spacing: 1px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo span { color: white; }
.logo-dot {
  width: 8px; height: 8px;
  background: var(--primary);
  border-radius: 50%;
  animation: blink 2s infinite;
}
@keyframes blink {
  0%,100% { opacity:1; box-shadow: 0 0 10px var(--primary); }
  50% { opacity:0.4; box-shadow: none; }
}

.nav-links {
  display: flex;
  list-style: none;
  align-items: center;
  gap: 15px;
}

.nav-links > li {
  position: relative;
  padding: 20px 0; /* Area de hover más amplia */
}

.nav-links > li > a {
  color: var(--text);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.nav-links > li > a:hover,
.nav-links > li > a.active {
  color: var(--primary);
  background: var(--primary-dim);
}

.nav-links > li > a svg {
  transition: transform 0.2s;
}
.nav-links > li:hover > a svg {
  transform: rotate(180deg);
}

/* DROPDOWN */
.dropdown {
  visibility: hidden;
  opacity: 0;
  position: absolute;
  top: 100%;
  left: 0;
  background: #0a1824;
  border: 1px solid var(--border);
  border-radius: 12px;
  min-width: 280px;
  overflow: hidden;
  box-shadow: 0 25px 50px rgba(0,0,0,0.6);
  transform: translateY(10px);
  transition: all 0.3s ease;
}
.nav-links > li:hover .dropdown { 
  visibility: visible; 
  opacity: 1; 
  transform: translateY(0); 
}

.dropdown a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 400;
  transition: all 0.2s;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.dropdown a:last-child { border-bottom: none; }
.dropdown a:hover { background: var(--primary-dim); color: var(--primary); padding-left: 26px; }
.dropdown a .icon { font-size: 1.2rem; width: 26px; text-align: center; }

.nav-cta {
  background: var(--primary);
  color: #fff !important;
  padding: 10px 24px !important;
  border-radius: 50px !important;
  font-weight: 600 !important;
  font-size: 0.9rem !important;
  transition: all 0.3s !important;
  text-decoration: none;
  box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
}
.nav-cta:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5) !important;
  background: var(--accent) !important;
}

/* HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 5px;
  background: none;
  border: none;
  z-index: 1002;
}
.hamburger span {
  display: block;
  width: 25px;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all 0.3s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

/* MOBILE MENU */
.mobile-menu {
  display: none;
  position: fixed;
  top: 75px; left: 0; right: 0; bottom: 0;
  background: rgba(5,10,14,0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  padding: 30px;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
}
.mobile-menu.open { display: flex; }

.mobile-menu h4 {
  color: var(--primary);
  font-family: 'Montserrat', sans-serif;
  margin: 20px 0 10px;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.mobile-menu a {
  color: var(--text);
  text-decoration: none;
  font-size: 1.1rem;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-weight: 400;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.mobile-menu a:hover { color: var(--primary); }
.mobile-menu .mobile-cta {
  margin-top: 30px;
  background: var(--primary);
  color: #fff;
  font-weight: 600;
  border-radius: 50px;
  text-align: center;
  padding: 16px;
  font-size: 1rem;
  border-bottom: none;
  justify-content: center;
}

/* ══════════════════════════════
HERO
══════════════════════════════ */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 120px 20px 80px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 60% 40%, rgba(14, 165, 233, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 20% 70%, rgba(2, 132, 199, 0.06) 0%, transparent 50%),
    linear-gradient(180deg, #050a0e 0%, #0a1520 100%);
}

.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 900px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary-dim);
  border: 1px solid var(--border);
  color: var(--primary);
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 20px;
  border-radius: 50px;
  margin-bottom: 30px;
  animation: fadeUp 0.6s ease both;
}

.hero h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(2.5rem, 7vw, 5.2rem);
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 25px;
  animation: fadeUp 0.6s ease 0.1s both;
}

.hero h1 .line1 { display: block; color: white; }
.hero h1 .line2 {
  display: block;
  background: linear-gradient(90deg, var(--accent), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  font-size: 1.15rem;
  color: var(--muted);
  max-width: 650px;
  margin: 0 auto 40px;
  line-height: 1.7;
  animation: fadeUp 0.6s ease 0.2s both;
}

.hero-btns {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeUp 0.6s ease 0.3s both;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
  padding: 16px 40px;
  border-radius: 50px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
}
.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(14, 165, 233, 0.5);
  background: var(--accent);
}

.btn-outline {
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 16px 40px;
  border-radius: 50px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 0.95rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}
.btn-outline:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-3px);
  background: var(--primary-dim);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-top: 80px;
  padding-top: 50px;
  border-top: 1px solid rgba(255,255,255,0.07);
  flex-wrap: wrap;
  animation: fadeUp 0.6s ease 0.4s both;
}

.stat { text-align: center; }
.stat-num {
  font-family: 'Montserrat', sans-serif;
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}
.stat-label {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 500;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(30px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ══════════════════════════════
SECTIONS COMMON
══════════════════════════════ */
section { padding: 100px 20px; }

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: var(--primary);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 15px;
  font-family: 'Montserrat', sans-serif;
}
.section-label::before {
  content: '';
  display: block;
  width: 40px;
  height: 2px;
  background: var(--primary);
}

.section-title {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 800;
  color: white;
  line-height: 1.15;
  margin-bottom: 20px;
}

.section-sub {
  color: var(--muted);
  font-size: 1.05rem;
  max-width: 600px;
  line-height: 1.7;
  margin-bottom: 60px;
}

/* ══════════════════════════════
SERVICIOS (MODALES/POPUPS)
══════════════════════════════ */
#servicios { background: var(--bg2); }

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 35px 30px;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
  cursor: pointer; /* Indica que se puede hacer clic */
  text-align: center;
}

/* Scanline Animation */
.service-card::after {
  content: '';
  position: absolute;
  top: -100%;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  box-shadow: 0 0 12px var(--primary);
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover::after {
  opacity: 1;
  animation: scanline 2s linear infinite;
}

@keyframes scanline {
  0% { top: -10%; }
  100% { top: 110%; }
}

.service-card:hover {
  transform: translateY(-8px);
  border-color: var(--border);
  box-shadow: 0 20px 40px rgba(14, 165, 233, 0.1);
  background: rgba(20, 40, 60, 0.9);
}

.card-icon {
  font-size: 2.2rem;
  margin-bottom: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 65px;
  height: 65px;
  background: var(--primary-dim);
  border: 1px solid var(--border);
  border-radius: 16px;
  animation: pulseTech 3s infinite alternate;
  color: var(--primary);
}

@keyframes pulseTech {
  0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.2); }
  100% { box-shadow: 0 0 15px 2px rgba(14, 165, 233, 0.4); }
}

.service-card h3 {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: white;
  margin-bottom: 15px;
}

.card-action {
  color: var(--primary);
  font-size: 0.85rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  margin-top: 15px;
  opacity: 0.8;
  transition: opacity 0.3s;
}
.service-card:hover .card-action { opacity: 1; }

/* MODAL DE SERVICIOS */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 3000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}
.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal-content {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 24px;
  width: 90%;
  max-width: 500px;
  padding: 40px;
  position: relative;
  transform: translateY(30px) scale(0.95);
  transition: all 0.3s ease;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  text-align: center;
}
.modal-overlay.active .modal-content {
  transform: translateY(0) scale(1);
}

.modal-close {
  position: absolute;
  top: 20px; right: 20px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: var(--text);
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover { background: var(--primary); color: #fff; }

.modal-icon {
  font-size: 3rem;
  margin-bottom: 20px;
}
.modal-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  color: white;
  margin-bottom: 15px;
}
.modal-desc {
  color: var(--muted);
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 25px;
}
.modal-tags {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 30px;
}
.modal-tags span {
  background: var(--primary-dim); color: var(--primary);
  font-size: 0.8rem; padding: 6px 14px; border-radius: 50px; border: 1px solid var(--border); font-weight: 600;
}

/* ══════════════════════════════
PROYECTOS / GALERÍA
══════════════════════════════ */
#proyectos { background: var(--bg); }

.projects-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 20px;
}

.project-card {
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.05);
}

.project-card:nth-child(1) { grid-column: span 7; grid-row: span 2; }
.project-card:nth-child(2) { grid-column: span 5; }
.project-card:nth-child(3) { grid-column: span 5; }
.project-card:nth-child(4) { grid-column: span 4; }
.project-card:nth-child(5) { grid-column: span 4; }
.project-card:nth-child(6) { grid-column: span 4; }

.project-img {
  width: 100%;
  height: 100%;
  min-height: 220px;
  object-fit: cover;
  display: block;
  transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  filter: brightness(0.75) saturate(0.9);
}

.project-card:nth-child(1) .project-img { min-height: 460px; }

.project-card:hover .project-img {
  transform: scale(1.05);
  filter: brightness(0.6) saturate(1.1);
}

.project-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 30%, rgba(5,10,14,0.95) 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 25px;
}

.project-category {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 8px;
}

.project-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: white;
  line-height: 1.3;
}
.project-card:nth-child(1) .project-title { font-size: 1.5rem; }

.project-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(14, 165, 233, 0.15);
  border: 1px solid var(--border);
  color: var(--primary);
  font-size: 0.75rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 50px;
  backdrop-filter: blur(10px);
}

/* ══════════════════════════════
NOSOTROS
══════════════════════════════ */
#nosotros { background: var(--bg2); }

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.about-visual { position: relative; }

.about-img-main {
  width: 100%;
  border-radius: 20px;
  object-fit: cover;
  height: 500px;
  filter: brightness(0.85);
  border: 1px solid var(--border);
}

.about-img-accent {
  position: absolute;
  bottom: -30px;
  right: -30px;
  width: 220px;
  height: 180px;
  border-radius: 16px;
  object-fit: cover;
  border: 5px solid var(--bg2);
  filter: brightness(0.9);
}

.about-badge-float {
  position: absolute;
  top: 40px;
  left: -30px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 25px;
  display: flex;
  align-items: center;
  gap: 16px;
  backdrop-filter: blur(15px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}
.about-badge-float .num {
  font-family: 'Montserrat', sans-serif;
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}
.about-badge-float .label {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.4;
  font-weight: 500;
}

.about-content .section-sub { margin-bottom: 35px; }

.values-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 40px;
}

.value-item {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.value-icon {
  width: 48px;
  height: 48px;
  background: var(--primary-dim);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
  color: var(--primary);
}

.value-item h4 {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: white;
  margin-bottom: 6px;
}
.value-item p {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.6;
}

/* ══════════════════════════════
CONTACTO
══════════════════════════════ */
#contacto {
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

#contacto::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(14, 165, 233, 0.08), transparent 70%);
  pointer-events: none;
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
}

.contact-info { padding-top: 10px; }

.contact-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  margin-bottom: 25px;
  padding: 24px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  transition: all 0.3s;
  text-decoration: none;
}
.contact-item:hover {
  border-color: var(--border);
  transform: translateX(8px);
  background: rgba(20,40,60, 0.8);
}

.contact-icon {
  width: 52px;
  height: 52px;
  background: var(--primary-dim);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}

.contact-label {
  font-size: 0.8rem;
  color: var(--primary);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.contact-value { font-size: 1.05rem; color: white; font-weight: 500; }

.contact-form {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 24px;
  padding: 45px;
  position: relative;
}

.contact-form::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 25px;
  background: linear-gradient(135deg, var(--primary), transparent, var(--primary));
  z-index: -1;
  opacity: 0.2;
}

.contact-form h3 {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: white;
  margin-bottom: 25px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-group label {
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 500;
}

.form-group input,
.form-group select,
.form-group textarea {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 14px 18px;
  color: white;
  font-size: 0.95rem;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.2s;
  width: 100%;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--primary);
  background: rgba(14, 165, 233, 0.03);
}

.form-group select option { background: #0a1520; }
.form-group textarea { resize: none; height: 110px; }

.form-submit {
  width: 100%;
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 16px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 10px;
  font-family: 'Montserrat', sans-serif;
  box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
}
.form-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(14, 165, 233, 0.5);
  background: var(--accent);
}
